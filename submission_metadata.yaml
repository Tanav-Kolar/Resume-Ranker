  - "GitHub Copilot" # for auto-complete

ai_usage_summary: |
  Used Claude for building the evaluation harness and LLM-assisted label set, and code review. 
  The HyDE archetype profiles were LLM-authored offline.
  All architecture, tuning, and ranking decisions are the team's own.
  No candidate data was sent to any hosted LLM, and no LLM is called
  during the ranking step (network is off).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid ranker that models what the JD means, not its keywords. A hard pre-filter
  removes consulting-only and fictional-company profiles (100K to ~8.7K clean). Each
  candidate gets a composite fit score fusing structured signals — graded title/role
  tiers (the decisive anti-stuffer signal), trust-deflated skill relevance (claims
  discounted by Redrob assessment scores), experience-band fit and location — with a
  dense semantic signal: we embed HyDE-style hypothetical ideal-candidate profiles
  (bge-small-en-v1.5) and take each candidate's best cosine match against them, which
  surfaces strong "plain-language" fits whose titles undersell them. A behavioral
  multiplier down-weights inactive or unresponsive candidates; a honeypot veto removes
  logically-impossible profiles (e.g. a skill used longer than the person's career).
  Structured attributes stay graded features, not hard filters, to protect recall.
  Embeddings are precomputed offline; the ranking step is CPU-only, no-network.
  We validated locally against a 60-candidate LLM-labeled eval set scored on the organizers' 
  exact metric (NDCG@10/50, MAP, P@10), with an auto-eval after every run used to tune weights. 
  No LLM is called during ranking.

