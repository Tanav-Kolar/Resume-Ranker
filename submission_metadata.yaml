# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude Code"

ai_usage_summary: |
  Used Claude Code (claude-sonnet-4-6) to scaffold and implement the baseline
  rule-based ranker. No candidate data was fed to any LLM during ranking.
  All scoring is deterministic and CPU-only.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with transparent, weighted scoring. Five components:
  (1) Title/role fit — maps current and historical titles to tiers; dominates
  to defeat keyword-stuffer traps. (2) Skill relevance — trust-deflated count
  of core AI/ML skills using proficiency + assessment scores, saturated via tanh
  so skill piling can't overpower title. (3) Experience fit — rewards the 5-9 yr
  band (6-8 sweet spot = 1.0) with gentle decay above. (4) Location fit — Noida/
  Pune highest, Tier-1 India cities, generic India, abroad-if-willing-to-relocate.
  (5) Behavioral multiplier (0.5-1.2) — scales by recency, open-to-work flag, and
  recruiter response rate; all -1 sentinels treated as missing, not bad.
  Honeypot veto pushes logically-impossible profiles out of the shortlist.
  A documented `semantic` seam in score.py lets the human plug in dense
  retrieval without touching I/O or CLI code.
  Runtime: ~20s for 100K candidates on a single CPU core.

